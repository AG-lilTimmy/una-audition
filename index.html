<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Choir Audition Video</title>

<style>
body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#0f0f0f;
color:white;
}

header{
display:flex;
align-items:center;
padding:10px 20px;
background:#0f0f0f;
border-bottom:1px solid #222;
}

.logo{
color:#ff0000;
font-weight:bold;
font-size:22px;
margin-right:20px;
}

.search{
flex:1;
}

.search input{
width:60%;
padding:8px;
background:#121212;
border:1px solid #333;
color:white;
border-radius:20px;
}

.container{
display:flex;
padding:20px;
gap:20px;
}

.main{
flex:3;
}

.sidebar{
flex:1;
}

video{
width:100%;
background:black;
border-radius:10px;
}

.title{
font-size:20px;
margin-top:10px;
}

.channel{
display:flex;
align-items:center;
margin-top:10px;
gap:10px;
}

.channel img{
width:40px;
height:40px;
border-radius:50%;
}

.uploadBox{
margin-top:20px;
padding:20px;
border:1px dashed #444;
border-radius:10px;
text-align:center;
}

.uploadBox input{
margin-top:10px;
}

.recommend{
background:#1a1a1a;
padding:10px;
border-radius:10px;
margin-bottom:10px;
}

.thumbnail{
width:100%;
height:80px;
background:#333;
border-radius:6px;
margin-bottom:5px;
}
</style>
</head>

<body>

<header>
<div class="logo">▶ ChoirTube</div>
<div class="search">
<input placeholder="Search">
</div>
</header>

<div class="container">

<div class="main">

<video id="videoPlayer" controls></video>

<div class="title">Unabantu's Audition</div>

<div class="channel">
<img
  src="https://api.dicebear.com/9.x/adventurer-neutral/svg"
  alt="avatar"
/>
<div>
<div>Audition Submission</div>
<div style="font-size:12px;color:gray;">Private audition video</div>
</div>
</div>

<div class="uploadBox">
<div>Upload your audition video</div>
<input type="file" id="uploadVideo" accept="video/*">
</div>

</div>

<div class="sidebar">

<div class="recommend">
<div class="thumbnail"></div>
Sample Choir Performance
</div>

<div class="recommend">
<div class="thumbnail"></div>
Vocal Warmups
</div>

<div class="recommend">
<div class="thumbnail"></div>
Choir Technique
</div>

</div>

</div>

<script>

const upload = document.getElementById("uploadVideo");
const player = document.getElementById("videoPlayer");

upload.addEventListener("change", function(){

const file = this.files[0];

if(file){

const url = URL.createObjectURL(file);

player.src = url;

player.play();

}

});

</script>

</body>
</html>
